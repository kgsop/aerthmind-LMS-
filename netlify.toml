# netlify.toml
# ─────────────────────────────────────────────────────────────────────────────
# Aethermind — Netlify deployment configuration
# ─────────────────────────────────────────────────────────────────────────────

[build]
  # Bake Firebase env vars into public/env.js, then copy everything to /dist
  command   = "node scripts/inject-env.js && node scripts/build.js"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "18"

# ── SPA fallback: all paths serve index.html ─────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Cache static assets aggressively ─────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
